<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Happy Birthday 🎂</title><style>body{margin:0;font-family: 'Poppins', sans-serif;background: linear-gradient(135deg,#ff9a9e,#fad0c4);display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;overflow:hidden;}.container{background:white;padding:30px 20px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.2);max-width:90%;}h1{font-size:2rem;color:#ff4081;margin-bottom:10px;}p{font-size:1.1rem;color:#444;margin-bottom:20px;}button{background:#ff4081;color:white;border:none;padding:12px 25px;font-size:1rem;border-radius:30px;cursor:pointer;transition:0.3s;}button:hover{background:#e73370;}canvas{position:fixed;top:0;left:0;pointer-events:none;}@media (max-width:600px){h1{font-size:1.6rem;}p{font-size:1rem;}}</head><body><canvas id="confetti"></canvas><div class="container"><h1>🎂 Happy Birthday! 🎉</h1><p>Wishing you a day filled with happiness, laughter, and amazing memories.May all your dreams come true! 💖</p><button onclick="startConfetti()">Celebrate 🎉</button></div><script>const canvas = document.getElementById("confetti");const ctx = canvas.getContext("2d");canvas.width = window.innerWidth;canvas.height = window.innerHeight;let pieces = [];function createConfetti(){for(let i=0;i<150;i++){pieces.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height - canvas.height,size:Math.random()*8+4,speed:Math.random()*3+2,color:`hsl(${Math.random()*360},100%,50%)`});}}function drawConfetti(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces.forEach(p=>{ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.size,p.size);p.y += p.speed;if(p.y > canvas.height){p.y = -10;}});requestAnimationFrame(drawConfetti);}function startConfetti(){if(pieces.length===0){createConfetti();drawConfetti();}}window.addEventListener("resize",()=>{canvas.width = window.innerWidth;canvas.height = window.innerHeight;});</body></html>
